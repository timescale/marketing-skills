# Configuration for automatically generated release notes.
# GitHub uses this to categorize PRs when you click "Generate release notes"
# on a new release. PRs are grouped by label into the sections below.
#
# For this to work, add ONE label to each PR before merging:
#   skill, enhancement, fix, infra, docs
#
# PRs without a matching label land in "Other Changes."

changelog:
  exclude:
    authors:
      - github-actions[bot]
    labels:
      - skip-changelog
  categories:
    - title: "🆕 New Skills"
      labels:
        - skill
    - title: "✨ Improvements"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - fix
        - bug
    - title: "🏗️ Infrastructure"
      labels:
        - infra
    - title: "📝 Documentation"
      labels:
        - docs
        - documentation
    - title: "📦 Other Changes"
      labels:
        - "*"
