name: Notify Slack on release

# Fires when a release PR merges to main, notifying the team that the new
# version is live. This ensures the notification reflects when the version is
# actually available in `main`, not just when the release was drafted.

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run when the merge is from the release branch
    if: contains(github.event.head_commit.message, 'from timescale/release')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from plugin.json
        id: version
        run: |
          VERSION=$(jq -r '.version' plugins/tiger-marketing-skills/.claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Get release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Try to get the release notes from the matching GitHub Release
          RELEASE_BODY=$(gh release view "v${VERSION}" --json body --jq '.body' 2>/dev/null || echo "")

          if [ -z "$RELEASE_BODY" ]; then
            echo "No release notes found for v${VERSION}"
            echo "No release notes provided." > /tmp/slack_notes.txt
          else
            # GitHub markdown → Slack mrkdwn conversion
            python3 - <<'PYEOF' > /tmp/slack_notes.txt
          import re, os

          text = os.environ.get("RELEASE_BODY", "")

          # Strip HTML comments
          text = re.sub(r'<!--.*?-->', '', text, flags=re.DOTALL)

          # Strip out the "Full Changelog" line and everything after it
          text = re.sub(r'\n?\*\*Full Changelog\*\*:.*$', '', text, flags=re.DOTALL | re.MULTILINE)

          # Headers → bold text
          text = re.sub(r'^#{1,4}\s+(.+)$', r'*\1*', text, flags=re.MULTILINE)

          # Bold: **text** → *text*
          text = re.sub(r'\*\*(.+?)\*\*', r'*\1*', text)

          # Links: [text](url) → <url|text>
          text = re.sub(r'\[([^\]]+)\]\(([^)]+)\)', r'<\2|\1>', text)

          # Bullet points: - item → • item
          text = re.sub(r'^(\s*)- ', lambda m: m.group(1) + ('◦ ' if len(m.group(1)) >= 2 else '• '), text, flags=re.MULTILINE)

          # Clean up excessive blank lines
          text = re.sub(r'\n{3,}', '\n\n', text)

          print(text.strip())
          PYEOF
          fi
          
      - name: Post to Slack
        if: success()
        run: |
          SLACK_NOTES=$(cat /tmp/slack_notes.txt)
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/tigerdata-marketing-skills-${VERSION}.zip"

          # Use jq to build the complex Block Kit JSON safely
          PAYLOAD=$(jq -n \
            --arg ver "$VERSION" \
            --arg notes "$SLACK_NOTES" \
            --arg rel_url "$RELEASE_URL" \
            --arg dl_url "$DOWNLOAD_URL" \
            '{
              "text": "New release: v\($ver) is now available.",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚀 New Release: v\($ver)" }
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": $notes }
                },
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "How to Update"}
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "1. Download the zip file using the button below \n 2. In Claude Desktop (Cowork) → Customize → Personal plugins  →  + → Upload plugin \n 3. Select the zip file — it replaces your old version "}
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Release" },
                      "url": $rel_url
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📦 Download .zip" },
                      "url": $dl_url,
                      "style": "primary"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    { "type": "mrkdwn", "text": "Triggered by merge to `main`" }
                  ]
                }
              ]
            }')

          curl -sfS -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
