name: Release

# Triggered when a GitHub Release is published targeting the `release` branch.
# Builds the Cowork plugin .zip, attaches it to the release, bumps the version
# in plugin.json, commits to `release`, and opens a PR to `main` with auto-merge.
#
# Auth strategy:
#   - AUTOMATION_PAT for git push to protected branches and GitHub API operations
#   - Default GITHUB_TOKEN for uploading release assets

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release
          token: ${{ secrets.ORG_AUTOMATION_TOKEN }}

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # ── Build ──

      - name: Build Cowork plugin
        run: |
          cd plugins/tiger-marketing-skills
          ./build-plugin.sh --target cowork --version "${{ steps.version.outputs.version }}"

      - name: Upload Cowork plugin to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tigerdata-marketing-skills-*.zip

      # ── Version bump ──

      - name: Bump version in plugin.json
        run: |
          PLUGIN_JSON="plugins/tiger-marketing-skills/.claude-plugin/plugin.json"
          jq --arg version "${{ steps.version.outputs.version }}" \
            '.version = $version' "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"
          echo "Updated $PLUGIN_JSON to v${{ steps.version.outputs.version }}"
          cat "$PLUGIN_JSON"

      - name: Commit version bump to release
        run: |
          git config user.name "Eon"
          git config user.email "123763385+timescale-automation@users.noreply.github.com"
          git add plugins/tiger-marketing-skills/.claude-plugin/plugin.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push origin release

      # ── PR to main ──

      - name: Open PR from release to main
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Check if a PR already exists
          EXISTING_PR=$(gh pr list --base main --head release --state open --json number --jq '.[0].number' || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating title"
            gh pr edit "$EXISTING_PR" --title "Release v${VERSION}"
          else
            gh pr create \
              --base main \
              --head release \
              --title "Release v${VERSION}" \
              --body "Automated release PR for v${VERSION}. Merges \`release\` into \`main\` to make the new version live.

          **Release:** https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}

          This PR will auto-merge once checks pass."
          fi

